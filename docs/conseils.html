<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LoSP — Conseils</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <a class="homeBtn" href="./home.html" aria-label="Accueil">🏠</a>

    <div class="app">
      <header class="header">
        <div class="headerLeft">
          <h1 class="title">Conseils</h1>
          <p class="subtitle">
            Meta conseillée par mode de jeu, mise à jour depuis Google Sheets.
          </p>
        </div>

        <div class="headerRight">
          <div id="modeField">
            <div class="label">Mode de jeu</div>
            <select id="modeSelect" class="select" aria-label="Mode de jeu"></select>
          </div>

          <div id="secondaryField" style="display:none">
            <div class="label" id="secondaryLabel">Type</div>
            <select id="secondarySelect" class="select" aria-label="Filtre secondaire"></select>
          </div>
        </div>
      </header>

      <section class="card">
        <div class="cardHeader">
          <h2 class="cardTitle" id="currentTitle">—</h2>
        </div>

        <p class="subtitle" id="currentSubtitle" style="margin-top:0">
          Choisis un mode de jeu pour afficher les recommandations.
        </p>
      </section>

      <section class="card">
        <div class="cardHeader">
          <h2 class="cardTitle cardTitle--sm">Recommandations</h2>
        </div>

        <div id="results" aria-label="Liste des équipes conseillées"></div>
      </section>
    </div>

    <script src="./conseils.js"></script>
  </body>
</html>
