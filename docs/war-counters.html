<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LoSP — War Counters</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <a class="homeBtn" href="./index.html" aria-label="Accueil">🏠</a>

    <div class="app">
      <header class="header">
        <div class="headerLeft">
          <h1 class="title">Counters de Guerre</h1>
          <p class="subtitle">
            Choisis une défense, un joueur, puis compare la puissance.
          </p>
        </div>

        <div class="headerRight">
          <div>
            <div class="label">Alliance</div>
            <select id="allianceSelect" class="select" aria-label="Alliance"></select>
          </div>

          <div>
            <div class="label">Joueur</div>
            <select id="playerSelect" class="select" aria-label="Joueur"></select>
          </div>

          <div>
            <div class="label">Défense — Famille</div>
            <select id="defFamilySelect" class="select" aria-label="Famille de défense"></select>
          </div>

          <div>
            <div class="label">Défense — Variante</div>
            <select id="defVariantSelect" class="select" aria-label="Variante de défense"></select>
          </div>

          <div>
            <div class="label">Puissance défense adverse</div>
            <input
              id="enemyPower"
              class="select"
              type="text"
              inputmode="numeric"
              enterkeyhint="done"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="ex: 6500000"
              aria-label="Puissance de la défense adverse"
              pattern="[0-9\s\.\,]*"
            />
          </div>
        </div>
      </header>

      <!-- ✅ Défense : plus de compteur ici -->
      <section class="card">
        <div class="cardHeader">
          <h2 class="cardTitle" id="defTitle">—</h2>
        </div>

        <div class="portraits" id="defPortraits" aria-label="Personnages de la défense"></div>
      </section>

      <!-- ✅ Recommandations : joueur + compteur -->
      <section class="card">
        <div class="cardHeader">
          <h2 class="cardTitle">Recommandations</h2>

          <!-- petite stack à droite (sans toucher au CSS) -->
          <div style="display:flex; gap:10px; align-items:center;">
            <div class="chipCount" id="playerChip">—</div>
            <div class="chipCount" id="resultsCount">0</div>
          </div>
        </div>

        <div id="results" aria-label="Liste des counters disponibles"></div>
      </section>
    </div>

    <script src="./war-counters.js"></script>
  </body>
</html>
