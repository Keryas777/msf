name: Update War Season Rules JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update-war-season-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate war-season-rules.json
        run: node scripts/fetch-war-season-rules.mjs

      - name: Show git status
        run: git status --short

      - name: Commit and push if file changed
        run: |
          if [[ -z "$(git status --porcelain docs/data/war-season-rules.json)" ]]; then
            echo "No changes detected in docs/data/war-season-rules.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/war-season-rules.json
          git commit -m "chore: update war season rules json"
          git push