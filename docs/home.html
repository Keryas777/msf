<!-- /docs/home.html -->
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"
    />
    <meta name="theme-color" content="#0b0c0d" />
    <title>Accueil</title>

    <!-- ✅ Pas de cache-bust en PWA (le SW gère la version) -->
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./home.css" />

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon-512.PNG" />
    <meta name="apple-mobile-web-app-title" content="LoSP" />
  </head>

  <body>
    <div class="app">
      <header class="header homeHeader" aria-label="Accueil LoSP"></header>

      <section class="homeGrid" aria-label="Outils">
        <!-- Contres GA -->
        <a href="./war-counters.html" class="homeTile homeTile--contres">
          <img
            class="homeTileImg"
            src="./Contres.webp"
            alt="Contres GA"
            loading="eager"
            decoding="async"
          />
          <span class="srOnly">Contres GA</span>
        </a>

        <!-- ✅ Classements (page intermédiaire) -->
        <a href="./classements.html" class="homeTile homeTile--classement">
          <img
            class="homeTileImg"
            src="./Classement.webp"
            alt="Classements"
            loading="eager"
            decoding="async"
          />
          <span class="srOnly">Classements</span>
        </a>

        <!-- ISO-8 -->
        <a href="./iso.html" class="homeTile homeTile--iso">
          <img
            class="homeTileImg"
            src="./ISO-8.webp"
            alt="ISO-8"
            loading="eager"
            decoding="async"
          />
          <span class="srOnly">ISO-8</span>
        </a>
      </section>
    </div>

    <!-- Install Banner (iOS + Android) -->
    <div id="installBanner" class="installBanner" hidden>
      <div class="installLeft">
        <div class="installIcon" aria-hidden="true">⬇️</div>
        <div class="installText">
          <div class="installTitle">Installer LoSP</div>
          <div id="installSub" class="installSub">Ajoute LoSP sur ton écran d’accueil.</div>
        </div>
      </div>

      <div class="installActions">
        <button id="installHow" class="installBtn installBtnGhost" type="button" hidden>
          Comment faire
        </button>
        <button id="installNow" class="installBtn" type="button" hidden>Installer</button>
        <button id="installClose" class="installClose" type="button" aria-label="Fermer">✕</button>
      </div>
    </div>

    <!-- iOS How-to modal -->
    <div id="installModal" class="installModal" hidden>
      <div class="installModalBackdrop" data-close="1"></div>

      <div
        class="installModalCard"
        role="dialog"
        aria-modal="true"
        aria-labelledby="installModalTitle"
      >
        <div class="installModalTop">
          <div id="installModalTitle" class="installModalTitle">Installer sur iPhone</div>
          <button class="installClose" type="button" data-close="1" aria-label="Fermer">✕</button>
        </div>

        <ol class="installSteps">
          <li>
            Appuie sur <b>Partager</b>
            <span class="installPill" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 16V4"></path>
                <path d="M8 8l4-4 4 4"></path>
                <rect x="4" y="12" width="16" height="8" rx="2"></rect>
              </svg>
            </span>
          </li>
          <li>Choisis <b>Sur l’écran d’accueil</b></li>
          <li>Appuie sur <b>Ajouter</b></li>
        </ol>

        <div class="installTip">Astuce : ensuite LoSP s’ouvre comme une vraie app (plein écran).</div>

        <div class="installModalActions">
          <button class="installBtn" type="button" data-close="1">OK</button>
        </div>
      </div>
    </div>

    <script>
      // glow "dynamique" au tap/clic (iOS friendly)
      (function () {
        const tiles = document.querySelectorAll(".homeTile");
        tiles.forEach((t) => {
          const press = () => {
            t.classList.add("is-pressed");
            clearTimeout(t.__pressTimer);
            t.__pressTimer = setTimeout(() => t.classList.remove("is-pressed"), 220);
          };
          const release = () => t.classList.remove("is-pressed");

          t.addEventListener("pointerdown", press, { passive: true });
          t.addEventListener("pointerup", release, { passive: true });
          t.addEventListener("pointercancel", release, { passive: true });
          t.addEventListener("mouseleave", release, { passive: true });
        });
      })();
    </script>

    <script src="./install-banner.js"></script>

    <script>
      // ✅ SW registration + update + auto-reload when new SW takes control
      (function () {
        if (!("serviceWorker" in navigator)) return;

        let reloading = false;

        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloading) return;
          reloading = true;
          window.location.reload();
        });

        window.addEventListener("load", async () => {
          try {
            const reg = await navigator.serviceWorker.register("./sw.js", { scope: "./" });
            if (reg && typeof reg.update === "function") reg.update();
          } catch (e) {
            console.error(e);
          }
        });
      })();
    </script>
  </body>
</html>
