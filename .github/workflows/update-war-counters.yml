name: Update War Counters JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build war-counters.json from Google Sheets
        env:
          CSV_URL: https://docs.google.com/spreadsheets/d/e/2PACX-1vTYKGvuHFRrB59aW6oMHBVFTRBdHhxxZP76YmwlpedoepMftwst1MfCwLg7pMLCPsGOpSrADdLzntQH/pub?gid=1440171156&single=true&output=csv
          OUT_FILE: docs/data/war-counters.json
        run: |
          node scripts/sheets-war-counters.mjs

      - name: Show git status
        run: git status --short

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain docs/data/war-counters.json)" ]]; then
            echo "No changes detected in docs/data/war-counters.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/war-counters.json
          git commit -m "chore: update war-counters.json"
          git push