<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload roster Zeus</title>
<style>
:root{
  --bg-top: #201809;
  --bg-bottom: #050607;
  --glow: rgba(255,210,74,.28);
  --panel: rgba(0,0,0,.42);
  --border: rgba(255,255,255,.12);
  --text: rgba(255,255,255,.94);
  --muted: rgba(255,255,255,.72);
  --btn-bg: #f2cf58;
  --btn-text: #111;
  --ok-bg: rgba(46, 204, 113, .14);
  --ok-border: rgba(46, 204, 113, .35);
  --ok-text: #9df0bb;
  --err-bg: rgba(255, 77, 77, .14);
  --err-border: rgba(255, 77, 77, .35);
  --err-text: #ffb1b1;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  min-height:100%;
}

body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top, var(--glow), transparent 42%),
    linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  width:min(100%, 560px);
  background: var(--panel);
  border:1px solid var(--border);
  border-radius:24px;
  padding:34px 24px 24px;
  text-align:center;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow:
    0 12px 32px rgba(0,0,0,.45),
    inset 0 0 28px var(--glow);
}

.logo{
  width: calc(100% + 48px);
  max-width: none;
  height: 180px;
  object-fit: contain;
  object-position: center;
  display:block;
  margin: -34px -24px 22px;
  padding: 10px 0;
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
}

h1{
  margin:0 0 12px;
  font-size:28px;
  line-height:1.1;
  font-weight:900;
}

.sub{
  margin:0 0 28px;
  color:var(--muted);
  font-size:16px;
  line-height:1.4;
}

.stack{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.field{
  text-align:left;
}

.label{
  display:block;
  margin:0 0 8px;
  font-size:14px;
  color:var(--muted);
  font-weight:700;
}

input[type="file"],
input[type="password"]{
  width:100%;
  border-radius:14px;
  border:1px solid var(--border);
  background: rgba(255,255,255,.06);
  color:var(--text);
  font-size:16px;
  outline:none;
}

input[type="file"]{
  padding:12px;
}

input[type="password"]{
  padding:14px 16px;
}

input[type="password"]::placeholder{
  color:rgba(255,255,255,.45);
}

button{
  width:100%;
  margin-top:4px;
  padding:13px 18px;
  border:none;
  border-radius:16px;
  background: var(--btn-bg);
  color: var(--btn-text);
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  box-shadow: 0 8px 24px rgba(0,0,0,.28);
}

button:active{
  transform:scale(.99);
}

button:disabled{
  opacity:.65;
  cursor:wait;
}

#result{
  margin-top:22px;
  min-height:74px;
  padding:16px;
  border-radius:16px;
  border:1px solid var(--border);
  background: rgba(255,255,255,.04);
  text-align:left;
  white-space:pre-wrap;
  font-size:14px;
  line-height:1.45;
  color:var(--text);
}

.resultBox{
  border-radius:16px;
  padding:16px;
  border:1px solid var(--border);
}

.resultBox.ok{
  background: var(--ok-bg);
  border-color: var(--ok-border);
  color: var(--ok-text);
}

.resultBox.error{
  background: var(--err-bg);
  border-color: var(--err-border);
  color: var(--err-text);
}

.resultTitle{
  font-size:18px;
  font-weight:900;
  margin:0 0 8px;
}

.resultText{
  margin:0;
  line-height:1.45;
}

details{
  margin-top:14px;
}

summary{
  cursor:pointer;
  color:var(--muted);
  font-weight:700;
}

.tech{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background: rgba(255,255,255,.05);
  border:1px solid var(--border);
  color:var(--text);
  white-space:pre-wrap;
  font-size:13px;
  line-height:1.4;
}

@media (max-width:520px){
  .card{
    padding:28px 18px 18px;
    border-radius:20px;
  }

  .logo{
  width: calc(100% + 36px);
  height: 160px;
  object-fit: contain;
  margin: -28px -18px 20px;
  padding: 8px 0;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
}

  h1{
  font-size:24px;
  }

  .sub{
    font-size:15px;
    margin-bottom:22px;
  }
}
</style>
</head>

<body>

<div class="card">
  <img class="logo" src="../upload_zeus.webp" alt="Zeus">

  <h1>Upload roster — Zeus</h1>
  <p class="sub">
    Importe le fichier CSV roster de l’alliance Zeus pour mettre à jour automatiquement les données.
  </p>

  <div class="stack">
    <div class="field">
      <label class="label" for="file">Fichier CSV</label>
      <input type="file" id="file" accept=".csv,text/csv">
    </div>

    <div class="field">
      <label class="label" for="pwd">Mot de passe</label>
      <input type="password" id="pwd" placeholder="Entrer le mot de passe">
    </div>

    <button id="uploadBtn" onclick="upload()">Uploader</button>
  </div>

  <div id="result">En attente d’un fichier…</div>
</div>

<script>
const ENDPOINT = "https://msf-upload.deliriousfan7.workers.dev/zeus";

function escapeHtml(str){
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function showInfo(message){
  document.getElementById("result").innerHTML = escapeHtml(message);
}

function showSuccess(data, rawText){
  const alliance = data?.alliance || "zeus";
  const players = data?.players ?? "?";
  const file = data?.file || "";
  const message = data?.message || "Upload terminé avec succès.";

  document.getElementById("result").innerHTML = `
    <div class="resultBox ok">
      <div class="resultTitle">✅ Upload réussi</div>
      <p class="resultText">
        Alliance : <strong>${escapeHtml(alliance)}</strong><br>
        Joueurs traités : <strong>${escapeHtml(players)}</strong><br>
        Fichier mis à jour : <strong>${escapeHtml(file)}</strong><br>
        ${escapeHtml(message)}
      </p>
      <details>
        <summary>Détails techniques</summary>
        <div class="tech">${escapeHtml(rawText)}</div>
      </details>
    </div>
  `;
}

function showError(title, rawText){
  document.getElementById("result").innerHTML = `
    <div class="resultBox error">
      <div class="resultTitle">❌ ${escapeHtml(title)}</div>
      <p class="resultText">L’upload n’a pas abouti correctement.</p>
      <details open>
        <summary>Détails techniques</summary>
        <div class="tech">${escapeHtml(rawText)}</div>
      </details>
    </div>
  `;
}

async function upload(){
  const file = document.getElementById("file").files[0];
  const pwd = document.getElementById("pwd").value;
  const result = document.getElementById("result");
  const btn = document.getElementById("uploadBtn");

  if(!file){
    showError("Aucun fichier sélectionné", "Choisir un fichier CSV.");
    return;
  }

  if(!pwd){
    showError("Mot de passe manquant", "Entrer le mot de passe avant l’envoi.");
    return;
  }

  btn.disabled = true;
  showInfo("⏳ Lecture du fichier…");

  try{
    const text = await file.text();

    showInfo("⏳ Upload en cours…");

    const res = await fetch(ENDPOINT,{
      method:"POST",
      headers:{
        "Content-Type":"text/csv",
        "x-upload-password":pwd
      },
      body:text
    });

    const rawText = await res.text();

    let data = null;
    try{
      data = JSON.parse(rawText);
    }catch(_){}

    if(res.ok && data && data.ok){
      showSuccess(data, rawText);
    }else{
      showError(`Erreur HTTP ${res.status}`, rawText);
    }
  }catch(err){
    showError("Erreur réseau", String(err?.message || err));
  }finally{
    btn.disabled = false;
  }
}
</script>

</body>
</html>
