<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"
    />
    <meta name="theme-color" content="#0b0c0d" />
    <title>Classement TCP — Groupement</title>

    <link rel="stylesheet" href="./tcp.css?v=ts" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
  </head>

  <body>
    <div class="app">
      <header class="header">
        <!-- ⬅️ retour page précédente -->
        <button
          type="button"
          class="backBtn"
          aria-label="Retour"
          onclick="history.back()"
        >⬅️</button>

        <!-- 🏠 home (désormais en haut à droite via style.css) -->
        <a href="./home.html" class="homeBtn" aria-label="Accueil">🏠</a>

        <div class="headerLeft">
          <h1 class="title">Classement TCP</h1>
          <p class="subtitle">Comparaison de la puissance de roster (TCP) au sein du groupement</p>
        </div>
      </header>

      <section class="card filtersCard">
        <div class="filters" role="group" aria-label="Filtres alliances">
          <label class="filterToggle">
            <input id="filterZeus" type="checkbox" checked />
            <span class="fStack"><span class="fEmoji">⚡</span><span class="fName">Zeus</span></span>
          </label>

          <label class="filterToggle">
            <input id="filterDionysos" type="checkbox" checked />
            <span class="fStack"><span class="fEmoji">🍇</span><span class="fName">Dionysos</span></span>
          </label>

          <label class="filterToggle">
            <input id="filterPoseidon" type="checkbox" checked />
            <span class="fStack"><span class="fEmoji">🔱</span><span class="fName">Poséidon</span></span>
          </label>
        </div>
      </section>

      <section class="card">
        <div class="cardHeader">
          <div></div>
          <div class="chipCount">
            <span id="playersCount">0</span>
          </div>
        </div>

        <!-- Liste classement TCP -->
        <div id="players" class="players">
          <!-- Le JS injectera des .rankRow ici -->
        </div>
      </section>
    </div>

    <script>
      (function () {
        const links = document.querySelectorAll('link[rel="stylesheet"]');
        links.forEach((l) => {
          if (l.href.includes("v=ts")) l.href = l.href.replace("v=ts", "v=" + Date.now());
        });

        const s = document.createElement("script");
        s.src = "./tcp.js?v=" + Date.now();
        s.defer = true;
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
