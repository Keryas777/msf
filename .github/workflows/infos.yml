name: Update infos.json

on:
  workflow_dispatch:

  schedule:
    - cron: "15 */6 * * *" # toutes les 6h

  push:
    paths:
      - "scripts/sheets-infos.mjs"
      - "docs/data/joueurs.json"
      - ".github/workflows/infos.yml"

permissions:
  contents: write

concurrency:
  group: update-infos-json
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate docs/data/infos.json
        env:
          OUT_FILE: docs/data/infos.json

          # ✅ Option recommandée : GViz (lecture publique), PAS "Publier sur le web"
          # Spreadsheet ID (le tien)
          SHEET_ID: 1RxAokcQw7rhNigPj8VwipbRRf9PVNA6lJzIVqdMBAXQ

          # GIDs des 3 onglets Infos
          INFOS_ZEUS_GID: "799736684"
          INFOS_DIONYSOS_GID: "1862527085"
          INFOS_POSEIDON_GID: "1533167416"

          # joueurs local
          JOUEURS_JSON_FILE: docs/data/joueurs.json
          JOUEURS_CSV_URL: ""

        run: |
          node --version
          test -f docs/data/joueurs.json || (echo "❌ docs/data/joueurs.json introuvable" && exit 1)
          node scripts/sheets-infos.mjs
          echo "----- git status after generation -----"
          git status --porcelain

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A docs/data/infos.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update infos.json"
          git push origin HEAD:${GITHUB_REF_NAME}